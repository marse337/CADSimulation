  <!-- Hide Microsoft Endpoint DLP classification banner -->
  <script>
  (function() {
    function hideDLP(root) {
      root.querySelectorAll('[class*="sensitivity" i], [class*="dlp" i], [id*="sensitivity" i], [id*="dlp" i], [class*="EndpointDLP" i]').forEach(function(el) {
        el.style.setProperty('display', 'none', 'important');
      });
    }
    hideDLP(document);
    new MutationObserver(function(mutations) {
      mutations.forEach(function(m) {
        m.addedNodes.forEach(function(node) {
          if (node.nodeType === 1) {
            var text = node.textContent || '';
            if (text.indexOf('Sensitivity Classification') !== -1 || text.indexOf('Endpoint DLP') !== -1) {
              node.style.setProperty('display', 'none', 'important');
            }
            hideDLP(node);
          }
        });
      });
    }).observe(document.body, { childList: true, subtree: true });
  })();
  </script>
